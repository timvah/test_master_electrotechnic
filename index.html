<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestMaster3000 — Плеер тестов</title>
    <meta name="description" content="Интерактивный онлайн-плеер для прохождения тестов. Лёгкая подготовка к сессии.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Animated background -->
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-container">
        <!-- ============ WELCOME SCREEN ============ -->
        <section id="welcome-screen" class="screen active">
            <div class="welcome-card">
                <div class="logo-container">
                    <div class="logo-icon">
                        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                            <rect x="4" y="4" width="40" height="40" rx="12" fill="url(#logo-grad)" opacity="0.15" />
                            <path d="M16 24L22 30L34 18" stroke="url(#logo-grad)" stroke-width="3.5"
                                stroke-linecap="round" stroke-linejoin="round" />
                            <defs>
                                <linearGradient id="logo-grad" x1="4" y1="4" x2="44" y2="44">
                                    <stop stop-color="#818cf8" />
                                    <stop offset="1" stop-color="#6366f1" />
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h1 class="logo-text">Test<span class="logo-accent">Master</span></h1>
                </div>
                <p class="welcome-subtitle" id="test-title-display">Загрузка теста...</p>

                <div class="test-meta" id="test-meta">
                    <div class="meta-chip">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 6v6l4 2" />
                        </svg>
                        <span id="meta-count">— вопросов</span>
                    </div>
                    <div class="meta-chip">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z" />
                            <line x1="4" y1="22" x2="4" y2="15" />
                        </svg>
                        <span>Случайный порядок</span>
                    </div>
                </div>

                <button class="btn-start" id="btn-start">
                    <span>Начать тест</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12" />
                        <polyline points="12 5 19 12 12 19" />
                    </svg>
                </button>

                <div class="keyboard-hints">
                    <span class="hint-key">↑↓</span> выбор
                    <span class="hint-sep">·</span>
                    <span class="hint-key">Enter</span> ответить
                    <span class="hint-sep">·</span>
                    <span class="hint-key">←→</span> навигация
                </div>
            </div>
        </section>

        <!-- ============ TEST SCREEN ============ -->
        <section id="test-screen" class="screen">
            <div class="test-topbar">
                <button class="btn-icon" id="btn-to-welcome" title="На главную">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12" />
                        <polyline points="12 19 5 12 12 5" />
                    </svg>
                </button>
                <div class="progress-pill" id="progress-text">1 / 10</div>
            </div>

            <!-- Progress bar -->
            <div class="progress-track">
                <div class="progress-fill" id="progress-bar-fill"></div>
            </div>

            <!-- Question card -->
            <div class="question-card">
                <p class="question-label">Вопрос</p>
                <h2 class="question-text" id="question-text">Текст вопроса</h2>
                <div class="question-images" id="question-images"></div>
            </div>

            <!-- Answers -->
            <div class="answers-list" id="answers-container">
                <!-- Dynamically generated -->
            </div>

            <!-- Feedback -->
            <div class="feedback-bar" id="feedback-banner"></div>

            <!-- Controls -->
            <div class="test-controls">
                <button class="btn-ctrl btn-ctrl--secondary" id="btn-prev" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                    Назад
                </button>
                <button class="btn-ctrl btn-ctrl--primary" id="btn-submit" disabled>
                    Ответить
                </button>
                <button class="btn-ctrl btn-ctrl--accent" id="btn-next" style="display: none;">
                    Далее
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6" />
                    </svg>
                </button>
            </div>
        </section>

        <!-- ============ RESULT SCREEN ============ -->
        <section id="result-screen" class="screen">
            <div class="result-header">
                <h1 class="result-title">Результаты</h1>
            </div>

            <div class="score-ring" id="score-ring">
                <svg viewBox="0 0 120 120" class="ring-svg">
                    <circle cx="60" cy="60" r="52" class="ring-track" />
                    <circle cx="60" cy="60" r="52" class="ring-fill" id="ring-fill" />
                </svg>
                <div class="ring-content">
                    <span class="ring-percent" id="score-percentage">0%</span>
                    <span class="ring-emoji" id="score-emoji">🏆</span>
                </div>
            </div>

            <p class="score-summary" id="score-details">Правильно: 0 из 0</p>
            <p class="score-grade" id="grade-text">Отличная работа!</p>

            <!-- Errors table -->
            <div class="errors-panel" id="errors-section" style="display: none;">
                <h3 class="errors-heading">Работа над ошибками</h3>
                <div class="errors-scroll">
                    <table class="errors-table" id="errors-table">
                        <thead>
                            <tr>
                                <th>Вопрос</th>
                                <th>Ваш ответ</th>
                                <th>Верный ответ</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Dynamically filled -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="result-actions">
                <button class="btn-ctrl btn-ctrl--warning" id="btn-retry-errors" style="display: none;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 4v6h6" />
                        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
                    </svg>
                    Перепройти ошибки
                </button>
                <button class="btn-ctrl btn-ctrl--primary" id="btn-restart">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10" />
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                    </svg>
                    Пройти заново
                </button>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>

</html>
